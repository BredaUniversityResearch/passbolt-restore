services:

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "true"
      MYSQL_DATABASE:             ${MYSQL_DATABASE}
      MYSQL_USER:                 ${MYSQL_USER}
      MYSQL_PASSWORD:             ${MYSQL_PASSWORD}
    volumes:
      - database_volume:/var/lib/mysql
      # MariaDB auto-imports any .sql or .sql.gz file found here on first boot
      - ./restore:/docker-entrypoint-initdb.d:ro

  # The non-root image listens on 8080/4433 internally (not configurable)
  passbolt:
    image: passbolt/passbolt:latest-ce-non-root
    restart: unless-stopped
    depends_on:
      - db
    environment:
      APP_FULL_BASE_URL:         ${APP_FULL_BASE_URL}
      PASSBOLT_SECURITY_PROXIES_ACTIVE: "true"
      PASSBOLT_SSL_FORCE:               "false"
    volumes:
      - gpg_volume:/etc/passbolt/gpg
      - jwt_volume:/etc/passbolt/jwt
      - ./restore/passbolt.php:/etc/passbolt/passbolt.php:ro
    command:
      [
        "/usr/bin/wait-for.sh",
        "-t",
        "0",
        "db:3306",
        "--",
        "/docker-entrypoint.sh",
      ]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      passbolt:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/passbolt.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      - cert_data:/certs:ro

volumes:
  database_volume:
  gpg_volume:
  jwt_volume:
  cert_data: